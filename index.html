<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
	<link rel="stylesheet" type="text/css" href="css/default.css" />
	<script src="js/masonry.pkgd.js"></script>
	
</head>
	
<body>
	
	<div id="lightbox" class="lightbox">
		
		<div class="lightbox-card">
			
			<img id="lightbox-img" src="" alt="">
			
			<div class="lightbox-info">
				
				<h3 id="lightbox-title">Title</h3>
				
				<div class="lightbox-body">
				
					<div class="lightbox-text">
						<p id="lightbox-text"></p>
					</div>
				
					<div class="lightbox-map">
						<iframe
								width="450"
								height="250"
								frameborder="0" style="border:0"
								referrerpolicy="no-referrer-when-downgrade"
								src="https://www.google.com/maps/embed/v1/place?key=AIzaSyA-7lgcuYOldRXBEDS4f_YV7Lyp8Ly-Bxk&&q=Eiffel+Tower,Paris+France"
								allowfullscreen>
						</iframe>
					</div>
				</div>
			</div>
		</div>
	</div>
	
	<div class="container"> 
    		
		<div class="topnav">
			<a id="filterBtn" class="filter" onclick="toggleSideNav()" href="javascript:void(0)">Filters</a>
			<a href="#about">About</a>
			<a class="active" href="#home">Gallery</a>
		</div>
		
		<div id="mySidenav" class="sidenav sideHidden">
			<a href="javascript:void(0)" class="closebtn" onclick="toggleSideNav()">&times;</a>
			<span id="filterLocation" class="sideNavTitle">Location</span>
			<ul id="locationList" class="filterList"></ul>
			<span id="filterKeyword" class="sideNavTitle">Keyword</span>
			<ul id="keywordList" class="filterList"></ul>
			<button onclick="submitFilter()">Submit</button>
			
		</div>
		
		<div class="overlay">
			<a href="javascript:void(0)" class="closebtn" onclick="closeOverlay()">&times;</a>
			
			<div class="overlayConent">
				
			</div>
		</div>
		
  		<div id="grid" class="grid">
			<div class="grid-sizer"></div>
			<div class="grid-item" onclick="openOverlay()">
				<div class="grid-item-border"> 
					<span class="borderTitle">Milky Way over Montauk Lighthouse</span>
					<span class="borderLocation">ðŸ“Montauk Point State Park</span>
					<span class="borderDate">5/20/2025</span>
					
				</div>
				<img src="images/grid/APP DSC00514-Edit.jpg">
			
			</div>
	  
  		</div>
	</div>

<script src="js/imagesloaded.pkgd.js"></script> 
<script src="js/loadimages.js"></script> 

	
<script>
	
	function toggleSideNav() {
		var sideNav = document.getElementById("mySidenav");
		
		if(sideNav.classList.contains("sideHidden")) {
			sideNav.style.width = "14%";
			document.getElementById("grid").style.marginLeft = "14.5%";
			sideNav.classList.remove("sideHidden");
			sideNav.classList.add("sideVisible");
			document.getElementById("filterBtn").classList.add("active");
		}
		else {
			sideNav.style.width = "0";
			document.getElementById("grid").style.marginLeft = "7.5%";
			sideNav.classList.remove("sideVisible", "active");
			sideNav.classList.add("sideHidden");
			document.getElementById("filterBtn").classList.remove("active");
		}
		
	}
		
</script>
	
</body>
</html>
